name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /var/www/portfolio

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git*'
          path: ./
          remote_path: /var/www/portfolio
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Ensure Nginx is running
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            which nginx || apt-get install -y nginx
            systemctl enable nginx
            systemctl is-active --quiet nginx && systemctl reload nginx || systemctl start nginx
