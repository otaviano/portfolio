name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /var/www/portfolio

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git*'
          path: ./
          remote_path: /var/www/portfolio
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Ensure Nginx is running
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            systemctl is-active --quiet apache2 && systemctl stop apache2 && systemctl disable apache2 || true
            cat > /etc/nginx/sites-available/portfolio <<'EOF'
            server {
                listen 80;
                server_name otavianozibetti.tech www.otavianozibetti.tech;
                root /var/www/portfolio;
                index index.html;
                location / {
                    try_files $uri $uri/ =404;
                }
            }
            EOF
            ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/portfolio
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            ss -tlnp | grep :80 || true
            systemctl enable nginx || true
            systemctl is-active --quiet nginx && systemctl reload nginx || systemctl start nginx || true
            journalctl -xeu nginx.service --no-pager | tail -30
